<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Kalkulator HTML CSS JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>Kalkulator Sederhana</h1>
            <p class="subtitle">Tugas HTML, CSS, dan JavaScript</p>

            <div class="form-group">
                <label for="angka1">Angka Pertama</label>
                <input type="number" id="angka1" placeholder="Masukkan angka pertama">
            </div>

            <div class="form-group">
                <label for="angka2">Angka Kedua</label>
                <input type="number" id="angka2" placeholder="Masukkan angka kedua">
            </div>

            <div class="button-group">
                <button onclick="hitung('tambah')">+</button>
                <button onclick="hitung('kurang')">-</button>
                <button onclick="hitung('kali')">×</button>
                <button onclick="hitung('bagi')">÷</button>
            </div>

            <div class="result-box">
                <p>Hasil:</p>
                <h2 id="hasil">0</h2>
            </div>

            <button class="reset" onclick="resetForm()">Reset</button>
        </div>

        <div class="info-card">
            <h2>Contoh If Else Lebih Kompleks</h2>
            <p id="statusNilai"></p>

            <h2>Contoh Function Lebih Kompleks</h2>
            <p id="luas"></p>
            <p id="nilaiAkhir"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
