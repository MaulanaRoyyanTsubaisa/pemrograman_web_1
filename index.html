<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Total Belanja</title>

    <!-- CSS Eksternal -->
    <link rel="stylesheet" href="style.css" />

    <!-- CSS Internal -->
    <style>
      h1 {
        color: darkblue;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Kalkulator Total Belanja</h1>

      <!-- CSS Inline -->
      <p style="color: green">
        Program ini menghitung total belanja menggunakan JavaScript.
      </p>

      <p class="note">Minimal belanja Rp 100.000 untuk mendapatkan diskon.</p>

      <label>Harga Barang:</label>
      <input type="number" id="harga" />

      <label>Jumlah Barang:</label>
      <input type="number" id="jumlah" />

      <label>Diskon (%):</label>
      <input type="number" id="diskon" value="10" />

      <button onclick="hitungBelanja()">Hitung</button>

      <div id="hasil"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
